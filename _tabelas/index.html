<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Multimarcas | Vendas</title>

    <style>

        body {
            margin: 0px;
            padding: 30px;
            font-family: 'Times New Roman';
            background-color: #f4f4f4;
            color: #222;
        }

        .container {
            max-width: 1000px;
            margin: 0px;
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 14 px rgba(0, 0, 0, 0.12);
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        p.descricao {
            text-align: center;
            margin-bottom: 30px;
            color: #555;
        }

        .imagem-topo {
            display: block;
            width: 180px;
            margin: 0 auto 20px auto;
            border-radius: 10px;
        }

        table { 
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background-color: #fff;
        }

        th,td {
            border: 1px solid #333;
            padding: 12px;
            text-align: left;
            vertical-align: top;
        }

        thead th {
            background-color: #dcdcdc;
            font-weight: bold;
        }

        tbody tr:nth-child(even){
            background-color: #f9f9f9;
        }

        tfoot td {
            background-color: #efefef;
            font-weight: bold;
            text-align: center;
        }

        .col-marca {
            width: 30%;
        }

        .col-modelo {
            width: 40%;
        }

        .col-ano {
            width: 30%;
        }

        .imagem-carros {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .imagem-carros img {
            width: 70px;
            height: 45px;
            object-fit: cover;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        .rodape-imagem {
            display: block;
            width: 120px;
            margin: 25px auto 0 auto;
            opacity: 0.9;
        }

    </style>
</head>
<body>
    <div class="container">
        <img class="imagem-topo" src="./img/corolla.jpg" alt="Corolla Híbrido 2026">

        <h1>Modelos de Carros em Estoque</h1>

        <p class="descricao">Tabela de veículos disponíveis em estoque, multimarcas</p>

        <table >
            <thead>
                <tr>
                    <th class="Col-marca">Marca</th>
                    <th class="Col-modelo">Modelo</th>
                    <th class="Col-ano">Ano</th>
                </tr>
            </thead>

            <!-- Início tbody -->
            <tbody>
                <!-- Veículos Toyota -->
                 <tr>
                    <td rowspan="2">Toyota</td>
                    <td>
                        <div class="imagem-carros">
                            <img src="./img/corolla.jpg" alt="Toyota Corolla">
                            <span>Corolla</span>                            
                        </div>
                    </td>
                    <td>2026</td>
                 </tr>
                 <tr>
                    <td>
                        <div class="imagem-carros">
                            <img src="./img/camry.jpg" alt="Toyota Camry">
                            <span>Camry</span>                            
                        </div>
                    </td>
                    <td>2026</td>
                 </tr>
                 <!-- Fim veículos Toyota -->
                <!-- Veículos Volkswagen -->
                 <tr>
                    <td rowspan="2">Volkswagen</td>
                    <td>
                        <div class="imagem-carros">
                            <img src="./img/jetta.jpg" alt="Volkswagen Jetta">
                            <span>Jetta</span>                            
                        </div>
                    </td>
                    <td>2026</td>
                 </tr>
                 <tr>
                    <td>
                        <div class="imagem-carros">
                            <img src="./img/golf.jpg" alt="Volkswagen Golf">
                            <span>Golf</span>                            
                        </div>
                    </td>
                    <td>2026</td>
                 </tr>
                 <!-- Fim veículos Volkswagen -->
                 <!-- Veículos Honda -->
                 <tr>
                    <td rowspan="1">Honda</td>
                    <td>
                        <div class="imagem-carros">
                            <img src="./img/civic.jpg" alt="Honda Civic">
                            <span>Civic</span>                            
                        </div>
                    </td>
                    <td>2026</td>
                 </tr>
                 <!-- Fim veículos Honda -->
                 <!-- Veículos Nissan -->
                 <tr>
                    <td rowspan="1">Nissan</td>
                    <td>
                        <div class="imagem-carros">
                            <img src="./img/370z.jpg" alt="Nissan 370z">
                            <span>370z</span>                            
                        </div>
                    </td>
                    <td>2026</td>
                 </tr>
                 <!-- Fim veículos Nissan -->
                 <!-- Veículos Mitsubishi -->
                 <tr>
                    <td rowspan="1">Mitsubishi</td>
                    <td>
                        <div class="imagem-carros">
                            <img src="./img/lancer.jpg" alt="Mitsubishi Lancer">
                            <span>Lancer</span>                            
                        </div>
                    </td>
                    <td>2026</td>
                 </tr>
                 <!-- Fim veículos Mitsubishi -->
            </tbody>
            <!-- Início tfoot -->
            <tfoot>
                <tr>
                    <td colspan="3">Última atualização: 27/03/2026</td>
                </tr>
            </tfoot>
            <!-- Fim tfoot -->        
        </table>

        <img class="rodape-imagem" src="./img/logo.png" alt="Logomarca da Loja Max Multimarcas">

    </div>
</body>
</html>
